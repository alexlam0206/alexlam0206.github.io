<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Browser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #browser-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #url-bar {
            padding: 10px;
            display: flex;
            background-color: #f1f1f1;
            border-bottom: 1px solid #ccc;
        }
        #url-input {
            flex: 1;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #go-button {
            padding: 8px 16px;
            margin-left: 10px;
            font-size: 16px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        #go-button:hover {
            background-color: #0056b3;
        }
        #web-view {
            flex: 1;
            border: none;
        }
    </style>
</head>
<body>
    <div id="browser-container">
        <div id="url-bar">
            <input type="text" id="url-input" placeholder="Enter a URL (e.g., https://example.com)">
            <button id="go-button">Go</button>
        </div>
        <iframe id="web-view" src="about:blank"></iframe>
    </div>

    <script>
        document.getElementById('go-button').addEventListener('click', function() {
            const url = document.getElementById('url-input').value.trim();
            const webView = document.getElementById('web-view');

            // Ensure the URL starts with http:// or https://
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('Please enter a valid URL starting with http:// or https://');
                return;
            }

            // Try loading the URL in the iframe
            try {
                webView.src = url;
                console.log('Loading URL:', url);
            } catch (error) {
                console.error('Error loading URL:', error);
                alert('An error occurred while loading the URL. Please check the console for details.');
            }
        });

        // Allow pressing Enter to submit the URL
        document.getElementById('url-input').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                document.getElementById('go-button').click();
            }
        });
    </script>
</body>
</html>
